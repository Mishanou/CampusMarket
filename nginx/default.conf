server {
    listen 80;
    server_name localhost;
    root /var/www/public;

    index index.php index.html;
    charset utf-8;

    # Маршрутизация на FastAPI
    location /api/ {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://fastapi:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://fastapi:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # Маршрутизация на FastAPI WebSockets (для реалтайм-уведомлений продавцов)
    location /ws/ {
        proxy_pass http://fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 3600s;
    }

    # Основной сайт на Laravel SSR
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Передача обработки PHP-файлов в контейнер Laravel по порту 9000
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}